version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pesapilot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pesapilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pesapilot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pesapilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pesapilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pesapilot_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pesapilot}:${POSTGRES_PASSWORD:-pesapilot_secret}@db:5432/${POSTGRES_DB:-pesapilot}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pesapilot_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
